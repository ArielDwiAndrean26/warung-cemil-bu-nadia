        /* --- CSS (Desain Tampilan) --- */
        :root {
            --primary: #ff6b6b; /* Warna Merah Coral */
            --secondary: #4ecdc4; /* Warna Hijau Mint */
            --dark: #2d3436;
            --light: #f7f1e3;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 0.8s ease-in-out 2s forwards;
        }

        .loader {
            text-align: center;
        }

        .loader-text {
            font-size: 2rem;
            font-weight: bold;
            color: var(--white);
            margin-bottom: 2rem;
            animation: slideDown 0.8s ease-out;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid var(--white);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animasi untuk elemen saat dimuat */
        body.loaded header {
            animation: fadeIn 0.6s ease-out 0.2s both;
        }

        body.loaded .hero {
            animation: fadeIn 0.6s ease-out 0.4s both;
        }

        body.loaded .container {
            animation: fadeIn 0.6s ease-out 0.6s both;
        }

        body.loaded footer {
            animation: fadeIn 0.6s ease-out 0.8s both;
        }

        body.loaded .product-card {
            animation: fadeIn 0.5s ease-out forwards;
        }

        body.loaded .product-card:nth-child(1) { animation-delay: 0.7s; }
        body.loaded .product-card:nth-child(2) { animation-delay: 0.75s; }
        body.loaded .product-card:nth-child(3) { animation-delay: 0.8s; }
        body.loaded .product-card:nth-child(4) { animation-delay: 0.85s; }
        body.loaded .product-card:nth-child(5) { animation-delay: 0.9s; }
        body.loaded .product-card:nth-child(6) { animation-delay: 0.95s; }
        body.loaded .product-card:nth-child(7) { animation-delay: 1s; }

        /* Header */
        header {
            background-color: var(--white);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            display: flex;
            align-items: center;
        }

        .logo img {
            height: 90px;
            width: auto;
            object-fit: contain;
        }

        .cart-btn {
            background-color: var(--secondary);
            color: var(--white);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            position: relative;
            transition: transform 0.3s;
        }

        .cart-btn:hover {
            transform: scale(1.05);
        }

        .cart-count {
            background-color: var(--primary);
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.8rem;
            position: absolute;
            top: -5px;
            right: -5px;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
        }

        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .hero p { font-size: 1.2rem; }

        /* Product Grid */
        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .section-title {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--dark);
        }

        .category-filter {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .filter-btn {
            border: 1px solid var(--secondary);
            background: var(--white);
            color: var(--dark);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;

        .filter-btn:hover {
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background: var(--secondary);
            color: var(--white);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--white);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-img {
            width: 100%;
            height: 220px;
            object-fit: contain;
            object-position: center;
            background: #f7f1e3;
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .product-price {
            color: var(--primary);
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .product-category {
            background: #eef8f7;
            color: #2b8f88;
            border-radius: 12px;
            padding: 0.2rem 0.6rem;
            font-weight: 600;
        }

        .rating {
            color: #f5a623;
            font-weight: 600;
        }

        .variant-select {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: var(--white);
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
        }

        .add-btn {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .add-btn:hover {
            background-color: #ff5252;
        }

        .detail-btn {
            padding: 0.8rem;
            background-color: #f1f1f1;
            color: var(--dark);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Cart Modal (Popup) */
        .modal {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: var(--white);
            margin: 10% auto;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            position: relative;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close:hover {
            color: var(--primary);
        }

        .cart-items {
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            gap: 0.8rem;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .qty-btn, .delete-btn {
            border: none;
            border-radius: 4px;
            cursor: pointer;
            padding: 0.3rem 0.5rem;
            font-size: 0.85rem;
            transition: transform 0.2s;
        }

        .qty-btn {
            background: #efefef;
        }

        .qty-btn:hover {
            transform: scale(1.1);
        }

        .delete-btn {
            background: #ffdede;
            color: #c0392b;
        }

        }

            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 1rem;
        }

        .note-section {
            margin-top: 1rem;
        }

        .note-section label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: var(--dark);
        }

        .note-section textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            resize: vertical;
            font-family: inherit;
        }

        .name-section {
            margin-top: 1rem;
        }

        .name-section label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: var(--dark);
        }

        .name-section input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;

        .checkout-btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;

            margin-top: 10px;
            width: 100%;

        .checkout-btn:hover {
            background-color: #45b7b1;
        }

        .review-list {
            margin: 1rem 0;
            padding: 0;
            list-style: none;
        }

        .review-item {
            border-bottom: 1px solid #eee;
            padding: 0.5rem 0;
        }

        .comment-form {
            display: grid;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .comment-form input, .comment-form textarea, .comment-form select {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 0.5rem;
            width: 100%;

        /* WhatsApp Floating Button */

            bottom: 30px;
            right: 30px;

            height: 72px;

            align-items: center;

            cursor: pointer;

            text-decoration: none;
        }

        .whatsapp-float:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.22);
        }

        .whatsapp-float img {
            width: 100%;
            height: 100%;

            border-radius: 50%;
        }

        @media (max-width: 768px) {
            .product-img {
                height: auto;
                max-height: none;
            }

                bottom: 20px;
                right: 20px;
                width: 62px;
                height: 62px;
                padding: 5px;
            }
        }
    </style>
</head>

            const categoryFilter = document.getElementById('categoryFilter');
            const categories = ["Semua", ...new Set(products.map(product => product.category))];
            categoryFilter.innerHTML = categories.map(category => `
                <button 
                    class="filter-btn ${selectedCategory === category ? 'active' : ''}" 
                    onclick="setCategory('${category}')"
                >
                    ${category}
                </button>
            `).join('');
        }

        function setCategory(category) {
            selectedCategory = category;
            renderCategoryFilter();
            renderProducts();
        }

        // 2. Fungsi Menampilkan Produk
        function renderProducts() {
            const productList = document.getElementById('productList');
            const filteredProducts = selectedCategory === "Semua"
                ? products
                : products.filter(product => product.category === selectedCategory);

            productList.innerHTML = filteredProducts.map(product => `
                <div class="product-card">
                    <img src="${product.img}" alt="${product.name}" class="product-img">
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-meta">
                            <span class="product-category">${product.category}</span>
                            <span class="rating">⭐ ${getAverageRating(product)}</span>
                        </div>
                        <div class="product-price">Rp ${product.variants[0].price.toLocaleString('id-ID')}</div>
                        <select id="variant-${product.id}" class="variant-select" onchange="updateVariantPrice(${product.id})">
                            ${product.variants.map(variant => `
                                <option value="${variant.name}" data-price="${variant.price}">
                                    ${variant.name}
                                </option>
                            `).join('')}
                        </select>
                        <div class="product-actions">
                            <button class="detail-btn" onclick="showDetail(${product.id})">Detail</button>
                            <button class="add-btn" onclick="addToCart(${product.id})">Tambah ke Keranjang</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateVariantPrice(id) {
            const variantEl = document.getElementById(`variant-${id}`);
            const price = Number(variantEl.selectedOptions[0].dataset.price);
            const productCard = variantEl.closest('.product-card');
            productCard.querySelector('.product-price').innerText = `Rp ${price.toLocaleString('id-ID')}`;
        }

        // 3. Fungsi Menambah ke Keranjang
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const variantEl = document.getElementById(`variant-${id}`);
            const variant = variantEl ? variantEl.value : product.variants[0].name;
            const selectedPrice = variantEl
                ? Number(variantEl.selectedOptions[0].dataset.price)
                : product.variants[0].price;

            const existingItem = cart.find(item => item.id === id && item.variant === variant);

            if (existingItem) {
                existingItem.qty += 1;
            } else {
                cart.push({ ...product, qty: 1, variant, price: selectedPrice });
            }
            
            updateCartUI();
            alert(`${product.name} (${variant}) ditambahkan ke keranjang!`);
        }

        function changeQty(id, variant, delta) {
            const item = cart.find(cartItem => cartItem.id === id && cartItem.variant === variant);
            if (!item) return;
            item.qty += delta;
            if (item.qty <= 0) {
                cart = cart.filter(cartItem => !(cartItem.id === id && cartItem.variant === variant));
            }
            updateCartUI();
        }

        function removeFromCart(id, variant) {
            cart = cart.filter(item => !(item.id === id && item.variant === variant));
            updateCartUI();
        }

        // 4. Fungsi Mengupdate Tampilan Keranjang
        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const totalPriceEl = document.getElementById('totalPrice');

            // Update Jumlah Icon
            const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            cartCount.innerText = totalQty;

            // Update Isi Keranjang
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p>Keranjang masih kosong.</p>';
            } else {
                cartItemsContainer.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div>
                            <strong>${item.name}</strong> <br>
                            <small>Varian: ${item.variant}</small><br>
                            <small>Rp ${item.price.toLocaleString('id-ID')} x ${item.qty}</small>
                        </div>
                        <div>
                            <div>Rp ${(item.price * item.qty).toLocaleString('id-ID')}</div>
                            <div class="cart-item-actions">
                                <button class="qty-btn" onclick="changeQty(${item.id}, '${item.variant}', -1)">-</button>
                                <span>${item.qty}</span>
                                <button class="qty-btn" onclick="changeQty(${item.id}, '${item.variant}', 1)">+</button>
                                <button class="delete-btn" onclick="removeFromCart(${item.id}, '${item.variant}')">Hapus</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            // Update Total Harga
            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            totalPriceEl.innerText = total.toLocaleString('id-ID');
        }

        // 5. Fungsi Toggle Modal (Buka/Tutup)
        function toggleCart() {
            const modal = document.getElementById('cartModal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        function toggleDetail() {
            const detailModal = document.getElementById('detailModal');
            detailModal.style.display = detailModal.style.display === 'block' ? 'none' : 'block';
        }

        function showDetail(id) {
            const product = products.find(p => p.id === id);
            activeDetailId = id;
            const detailContent = document.getElementById('detailContent');
            detailContent.innerHTML = `
                <h2>${product.name}</h2>
                <p style="margin: 0.5rem 0;"><strong>Kategori:</strong> ${product.category}</p>
                <p style="margin: 0.5rem 0;"><strong>Harga:</strong> Rp ${product.price.toLocaleString('id-ID')}</p>
                <p>${product.description}</p>
                <h3 style="margin-top: 1rem;">Rating & Komentar (⭐ ${getAverageRating(product)})</h3>
                <ul class="review-list">
                    ${product.reviews.map(review => `
                        <li class="review-item">
                            <strong>${review.name}</strong> - ${'⭐'.repeat(review.stars)}<br>
                            <small>${review.comment}</small>
                        </li>
                    `).join('')}
                </ul>
                <form class="comment-form" onsubmit="submitReview(event)">
                    <input type="text" id="reviewerName" placeholder="Nama kamu" required>
                    <select id="reviewStars" required>
                        <option value="">Pilih rating</option>
                        <option value="5">5</option>
                        <option value="4">4</option>
                        <option value="3">3</option>
                        <option value="2">2</option>
                        <option value="1">1</option>
                    </select>
                    <textarea id="reviewComment" placeholder="Tulis komentar..." required></textarea>
                    <button type="submit">Kirim Komentar</button>
                </form>
            `;
            document.getElementById('detailModal').style.display = 'block';
        }

        function submitReview(event) {
            event.preventDefault();
            const product = products.find(item => item.id === activeDetailId);
            const name = document.getElementById('reviewerName').value.trim();
            const stars = Number(document.getElementById('reviewStars').value);
            const comment = document.getElementById('reviewComment').value.trim();

            if (!name || !stars || !comment) return;

            product.reviews.push({ name, stars, comment });
            renderProducts();
            showDetail(activeDetailId);
        }

        // 6. Fungsi Checkout (Mengirim ke WhatsApp)
        function checkout() {
            if (cart.length === 0) {
                alert("Keranjang masih kosong!");
                return;
            }

            const name = document.getElementById('customerName').value.trim();
            if (!name) {
                alert("Silakan masukkan nama pemesan!");
                return;
            }

            let message = `Halo Bu Nadia, saya ${name}, mau pesan makanan:%0A`;
            let total = 0;
            
            cart.forEach(item => {
                message += `- ${item.name} [${item.variant}] (x${item.qty}): Rp ${(item.price * item.qty).toLocaleString('id-ID')}%0A`;
                total += (item.price * item.qty);
            });
            
            message += `%0ATotal: Rp ${total.toLocaleString('id-ID')}`;
            
            const note = document.getElementById('cartNote').value.trim();
            if (note) {
                message += `%0ACatatan: ${note}`;
            }
            
            // Ganti nomor WhatsApp di bawah ini (Gunakan 62 bukan 0)
            const phoneNumber = "6285758314957"; 
            window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
            
            // Kosongkan keranjang setelah pesanan dikirim
            cart = [];
            document.getElementById('customerName').value = '';
            document.getElementById('cartNote').value = '';
            updateCartUI();
            toggleCart();
            alert("Pesanan berhasil dikirim! Keranjang telah dikosongkan.");
        }

        // Tutup modal jika klik di luar area modal
        window.onclick = function(event) {
            const modal = document.getElementById('cartModal');
            const detailModal = document.getElementById('detailModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
            if (event.target == detailModal) {
                detailModal.style.display = "none";
            }
        }

        // Fungsi untuk scroll ke atas dan reload halaman
        function scrollToTopAndReload() {
            // Scroll ke atas secara smooth (halus)
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
            
            // Reload halaman setelah 500ms (agar scroll selesai dulu)
            setTimeout(function() {
                location.reload();
            }, 500);
        }

        // Jalankan saat halaman dimuat
        window.addEventListener('load', function() {
            renderCategoryFilter();
            renderProducts();
            
            // Aktifkan animasi setelah loading screen selesai
            setTimeout(function() {
                document.body.classList.add('loaded');
            }, 2000);
        });
    </script>
</body>
</html>
